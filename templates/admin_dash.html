<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page d'administration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #f5f5f5;
        }

        .sidebar {
            width: 250px;
            background: #1f2937;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-create {
            background: #16a34a;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 6px;
        }

        .btn-create:hover {
            background: #15803d;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        p {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Administration</h2>

        <a href="{{ url_for('admin.create_event') }}">➕ Créer un événement</a>
        <a href="{{ url_for('users.logout') }}">🚪 Déconnexion</a>
    </div>

    <div class="content">

        <div class="header">
            <h1>Gestion des événements</h1>

            <a href="{{ url_for('admin.create_event') }}" class="btn-create">
                + Nouvel événement
            </a>
        </div>

        {% for event in events %}
        <div class="card">
            <div class="event-header">
                <div>
                    <h3>{{ event.event_name }}</h3>
                    <p>
                        {{ event.event_date }} • {{ event.location }}
                    </p>
                    <p>{{ event.category }}</p>
                    <p>{{ event.description }}</p>
                    <p>Places : {{ event.seats_available }}</p>
                </div>
        
                <div class="actions">
                    <a href="{{ url_for('admin.edit_event', event_id=event.id) }}" class="btn-edit">Modifier</a>
        
                    <form action="{{ url_for('admin.delete_event', event_id=event.id) }}" method="POST" onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer cet événement ?');">
                        <button class="btn-delete">Supprimer</button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}

   
    </div>

</body>

</html>
