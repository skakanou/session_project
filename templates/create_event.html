<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un événement</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 700px;
            max-width: 95%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-submit {
            background: #16a34a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-submit:hover {
            background: #15803d;
        }

        .btn-cancel {
            background: #dc2626;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
        }

        .btn-cancel:hover {
            background: #b91c1c;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Créer un événement</h1>

        <form method="POST" action="{{ url_for('admin.create_event') }}">

            <div class="form-group">
                <label for="event_name">Nom de l'événement</label>
                <input type="text" id="event_name" name="event_name" required>
            </div>

            <div class="form-group">
                <label for="event_date">Date de l'événement</label>
                <input type="date" id="event_date" name="event_date" required>
            </div>

            <div class="form-group">
                <label for="location">Localisation</label>
                <input type="text" id="location" name="location" required>
            </div>

            <div class="form-group">
                <label for="seats_available">Nombre de places disponibles</label>
                <input type="number" id="seats_available" name="seats_available" min="1" required>
            </div>

            <div class="form-group">
                <label for="category">Catégorie</label>

                <select id="category" name="category" required>
                    <option value="">-- Sélectionner une catégorie --</option>
                    <option value="Conference">Conférence</option>
                    <option value="Formation">Formation</option>
                    <option value="Musique">Musique</option>
                    <option value="Sport">Sport</option>
                    <option value="Technologie">Technologie</option>
                    <option value="Business">Business</option>
                    <option value="Culture">Culture</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Description</label>

                <textarea id="description" name="description" placeholder="Décrivez l'événement..." required></textarea>
            </div>

            <div class="buttons">

                <a href="{{ url_for('admin.admin_dash') }}" class="btn-cancel">
                    Annuler
                </a>

                <button type="submit" class="btn-submit">
                    Créer l'événement
                </button>

            </div>

        </form>

    </div>

</body>

</html>
