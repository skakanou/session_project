<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #1f2937;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            gap: 10px;
        }

        .search-form input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
        }

        .event {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .event:last-child {
            border-bottom: none;
        }

        .event-info h3 {
            margin-bottom: 5px;
        }

        .event-info p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Dashboard</h2>

        <a href="/events">📅 Événements</a>
        <a href="/user_dash">🎟️ Mes réservations</a>
        <a href="{{ url_for('users.logout') }}">🚪 Déconnexion</a>
    </div>

    <div class="content">

        <h1>Événements disponibles</h1>

        <div class="card">
            <form class="search-form" action="/events" method="GET">
                <input type="text" name="q" placeholder="Rechercher un événement..." 
                value="{{ query or '' }}" style="border: 1px solid #ddd; padding: 10px; border-radius: 6px; width: 100%;">
                <button type="submit">
                    Rechercher
                </button>
            </form>
        </div>
        {% for event in events %}
        <div class="card">

            <div class="event">
                <div class="event-info">
                    <h3>{{ event.event_name }}</h3>
                    <p>{{ event.event_date.strftime('%Y-%m-%d') }} • {{ event.location }}</p>
                    <p>{{ event.description }}</p>
                    <p>Places disponibles : {{ event.seats_available }}</p>
                </div>

                <form action="{{ url_for('reservation.make_reservation', event_id=event.id) }}" method="POST"
                    style="display:flex; gap:10px; align-items:center;">
                
                    <input type="number" 
                    name="quantity" 
                    min="1" 
                    max="{{ event.seats_available }}" 
                    value="1"
                        style="width:70px; padding:5px;">
                
                    <button type="submit">Réserver</button>
                </form>
            </div>

        </div>
        {% endfor %}

    </div>

</body>

</html>
